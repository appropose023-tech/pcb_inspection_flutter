workflows:
  build-app:
    name: Build Flutter APK
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Create Flutter project
        script: |
          flutter create app
          cp -r lib app/
          if [ -d "assets" ]; then cp -r assets app/; fi

      - name: Overwrite pubspec.yaml
        script: |
          cat > app/pubspec.yaml << 'EOF'
          name: pcb_inspector
          description: PCB Inspection App
          publish_to: "none"
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            camera: ^0.10.5+5
            http: ^1.2.0
            image: ^4.1.3

          flutter:
            uses-material-design: true
            assets:
              - assets/
          EOF

      - name: Build APK
        script: |
          cd app
          flutter build apk --release

    artifacts:
      - app/build/app/outputs/flutter-apk/app-release.apk
